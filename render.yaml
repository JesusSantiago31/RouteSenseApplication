envVarGroups:
  - name: routesense-shared
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true

services:
  # 1. Servicio de Administración
  - type: web
    name: routesense-administrador
    runtime: docker
    dockerContext: ./Backend/Administrador
    dockerfilePath: Backend/Administrador/Dockerfile
    plan: free
    region: ohio
    envVars:
      - fromGroup: routesense-shared

  # 2. Servicio de Autobuses
  - type: web
    name: routesense-autobus
    runtime: docker
    dockerContext: ./Backend/Autobus
    dockerfilePath: Backend/Autobus/Dockerfile
    plan: free
    region: ohio
    envVars:
      - fromGroup: routesense-shared

  # 3. Servicio de Conductores
  - type: web
    name: routesense-conductor
    runtime: docker
    dockerContext: ./Backend/Conductores
    dockerfilePath: Backend/Conductores/Dockerfile
    plan: free
    region: ohio
    envVars:
      - fromGroup: routesense-shared

  # 3.5 Servicio de Empresas
  - type: web
    name: routesense-empresas
    runtime: docker
    dockerContext: ./Backend/Empresas
    dockerfilePath: Backend/Empresas/Dockerfile
    plan: free
    region: ohio
    envVars:
      - fromGroup: routesense-shared

  # 4. Servicio de Paradas
  - type: web
    name: routesense-paradas
    runtime: docker
    dockerContext: ./Backend/Paradas
    dockerfilePath: Backend/Paradas/Dockerfile
    plan: free
    region: ohio
    envVars:
      - fromGroup: routesense-shared

  # 5. Servicio de Rutas
  - type: web
    name: routesense-rutas
    runtime: docker
    dockerContext: ./Backend/Rutas
    dockerfilePath: Backend/Rutas/Dockerfile
    plan: free
    region: ohio
    envVars:
      - fromGroup: routesense-shared

  # 6. Servicio de Clientes
  - type: web
    name: routesense-clientes
    runtime: docker
    dockerContext: ./Backend/Clientes
    dockerfilePath: Backend/Clientes/Dockerfile
    plan: free
    region: ohio
    envVars:
      - fromGroup: routesense-shared

  # 7. Servicio de Monitoreo (Real-time Tracking)
  - type: web
    name: routesense-monitoreo
    runtime: docker
    dockerContext: ./Backend/Monitoreo
    dockerfilePath: Backend/Monitoreo/Dockerfile
    plan: free
    region: ohio
    envVars:
      - fromGroup: routesense-shared

  # 8. Frontend (Aplicación Web)
  - type: web
    name: routesense-frontend
    runtime: static
    rootDir: ./Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_GOOGLE_MAPS_API_KEY
        value: AIzaSyDqCfjcoI9OUjGaivke2tG_L3rXRzBpR1c
      - key: VITE_API_AUTOBUS_URL
        value: https://routesense-autobus.onrender.com
      - key: VITE_API_EMPRESAS_URL
        value: https://routesense-empresas.onrender.com
      - key: VITE_API_CONDUCTORES_URL
        value: https://routesense-conductor.onrender.com
      - key: VITE_API_RUTAS_URL
        value: https://routesense-rutas.onrender.com
      - key: VITE_API_PARADAS_URL
        value: https://routesense-paradas.onrender.com
      - key: VITE_API_MONITOREO_URL
        value: https://routesense-monitoreo.onrender.com
