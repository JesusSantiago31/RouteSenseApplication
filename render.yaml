envVarGroups:
  - name: routesense-shared
    envVars:
      - key: DATABASE_URL
        sync: false # Debes pegarla manualmente en el dashboard de Render una vez
      - key: SECRET_KEY
        generateValue: true # Render generará una automáticamente

services:
  # 1. Servicio de Administración
  - type: web
    name: routesense-administrador
    runtime: docker
    dockerContext: ./Backend/Administrador
    dockerfilePath: Dockerfile
    plan: free
    region: ohio
    envVars:
      - fromGroup: routesense-shared

  # 2. Servicio de Autobuses
  - type: web
    name: routesense-autobus
    runtime: docker
    dockerContext: ./Backend/Autobus
    dockerfilePath: Dockerfile
    plan: free
    region: ohio
    envVars:
      - fromGroup: routesense-shared

  # 3. Servicio de Conductores
  - type: web
    name: routesense-conductor
    runtime: docker
    dockerContext: ./Backend/Conductor
    dockerfilePath: Dockerfile
    plan: free
    region: ohio
    envVars:
      - fromGroup: routesense-shared
